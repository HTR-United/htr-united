    même en présence de fautes. - L'orthographe ancienne est laissée telle quelle.\
    \  - Aucune restitution des accents manquants. Aucune correction des accents fautifs.
    Restitution de la bonne graphie de l'accent, lorsque nous considérons qu'il y
    a une variation de la graphie de celui-ci à cause de la rapidité d'écriture. \
    \   - Aucune restitution des traits d'union manquants. - Séparation des mots collés
    dès lors que la ligature entre ces mots semble due à la rapidité de l'écriture.\n\
    **Abréviations :** - Aucune résolution d'abréviation. - Utilisation du symbole
    monétaire de la livre tournois → **₶** (Unicode U+20B6).\n**Mots en exposant :**
    - Restitution seulement du mot sans le mettre en exposant.\n**Majuscules et minuscules
    :** -  Aucune restitution des majuscules, même lorsqu'elles sont absentes en début
    de phrase ou de nom propre.\n**Ponctuation :** - Aucune restitution de la ponctuation
    manquante. Aucune correction de la ponctuation fautive.  - Emploi du tiret cadratin
    (—, unicode U+2014) de part et d'autre d'une incise.  - Emploi du tiret demi-cadratin
    (–, unicode U+2013) pour marquer le changement d’interlocuteur dans les dialogues
    et devant les éléments des listes/ énumérations.\n"
