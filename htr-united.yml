  title: Argus des Brevets
  transcription-guidelines: "En premier lieu, nous avons décidé de fonder notre transcription
    sur les recommandations publiées dans l’ouvrage *L’édition critique des textes
    contemporains, XIXe-XXIe siècle*, par Christine Nougaret, Elisabeth Parinet et
    Florence Clavaud. Néanmoins, certaines adaptations ont été nécessaires afin de
    fournir un jeu de données issue de la transcription, qui soit à la fois proche
    du document source et exploitable par la suite. Ainsi, concernant les abréviations,
    nous avons décidé de conserver la graphie originale au sein de la transcription.
    Ce choix fut guidé par deux éléments : d’une part, la volonté de conserver une
    graphie intègre, afin de fournir aux chercheurs s’intéressant à ce sujet un texte
    facilement exploitable de manière automatique, comme par exemple une analyse quantitative
    des types de sociétés (anonymes, familiales,…) déposant des brevets. Cette décision
    fut motivée par la facilité de résolution et compréhension des abréviations par
    le lecteur. D'autre part, il nous semble que cette approche permettrait une réutilisation
    générales des données, telle qu'un processus d'apprentissage machine.\nNous avons
    été amené à réaliser certains choix relevant de la transcription et de l’édition
    du document. Pour ce faire, nous nous sommes référé au *Lexique typographique
    en usage à l’Imprimerie nationale* : - les tirets en fin de ligne faisant la césure
    au sein des mots ont été rétablis (ex : direc-tion). - les numéros de page en
    haut de page ont été transcris ainsi : « _ N _ » où N correspond au numéro de
    page. - en cas de caractères mal imprimés ou usés, ceux-ci ont été rétablis dans
    la mesure où ils sont facilement interprétables (mais non devinables) par le lecteur.\
    \ \n"
