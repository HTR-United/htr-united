  description: "L’argus des brevets de 1910 se présente sous la forme d’un imprimé
    contemporain, organisé en rubriques regroupant de manière chronologique puis thématique
    les brevets déposés en France. Cette énumération et présentation succincte des
    brevets est répartie en deux colonnes et présente des abréviations normalisées.
    Dès lors, ce présent guide de contribution au projet entend présenter l’ensemble
    des normes de transcriptions adoptées au cours de ce projet de transcription,
    réalisé sur la plateforme E-scriptorium, dans le cadre du cours Git du master
    TNAH à l’ENC.\n"
