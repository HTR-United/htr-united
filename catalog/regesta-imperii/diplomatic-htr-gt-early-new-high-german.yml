description: >-
  This repository contains a set of training data for ATR models (Kraken). It contains 50 pages of
  ground truth as image files (jpg) and transcription files (PAGE xml).
   
  The ground truth contains 50 pages including 2,177 lines with 18,626 word tokens and 110,618
  characters.
