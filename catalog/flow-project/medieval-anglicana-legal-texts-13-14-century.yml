schema: https://htr-united.github.io/schema/2023-06-27/schema.json
title: Medieval Anglicana Legal Texts (13th-14th Century)
url: >-
  https://huggingface.co/datasets/digital-history-bielefeld/image-text_anglicana-legal-texts
authors:
  - name: Melvin
    surname: Wilde
    orcid: 0009-0006-8774-8901
    roles:
      - transcriber
      - aligner
      - quality-control
  - name: Christopher
    surname: Kuhlmann
    orcid: 0009-0006-9455-6203
    roles:
      - transcriber
      - quality-control
      - digitization
institutions: []
description: >-
  This dataset contains 21,579 lines of high-quality Ground Truth data for
  Handwritten Text Recognition (HTR). It was created by the FLOW Project at
  Bielefeld University (Digital History) to facilitate the training of HTR
  models for medieval administrative and legal documents.


  The dataset consists of image snippets (lines) paired with their corresponding
  transcriptions and the line coordinates. The material focuses on legal records
  from the 13th and 14th centuries written in Anglicana script and Latin
  language.
project-name: FLOW Project
project-website: https://www.flow-project.net/
language:
  - lat
production-software: eScriptorium + Kraken & Transkribus & TrOCR
automatically-aligned: false
script:
  - iso: Latn
    qualify: Anglicana
script-type: only-manuscript
time:
  notBefore: '1200'
  notAfter: '1400'
hands:
  count: more-than-10
  precision: exact
license:
  name: CC-BY 4.0
  url: https://creativecommons.org/licenses/by/4.0/
format: Image-Text-Pairs
volume:
  - metric: lines
    count: 21579
transcription-guidelines: >-
  Diplomatic transcription. Resolution of abbreviations, no corrections 
  on misspellings, no use of the letter j and no too strongly damaged 
  or blackened documents.
