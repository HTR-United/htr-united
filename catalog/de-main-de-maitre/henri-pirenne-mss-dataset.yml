description: >-
 This dataset contains manually corrected ground truth data for Handwritten
 Text Recognition (HTR) of manuscripts written by the Belgian historian Henri
 Pirenne. The manuscripts date from 1909 to 1935 and were produced in Pirenne’s
 handwriting.
project-name: >-
 "De main de maître". Vers une transcription automatique des archives de
 l’historien Henri Pirenne et leur analyse génétique et intellectuelle
