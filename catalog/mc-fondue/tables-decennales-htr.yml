institutions: []
description: >-
  Ce corpus est composé de pages d’entraînement préparées pour le fine-tuning du modèle Manu Mc
  Fondue. Ces 17 doubles pages sont extraites des tables décennales (1902-1913) du 1er
  arrondissement de Lyon et recouvrent chaque initiale de la table. Il manque uniquement la lettre
  D. Le modèle de nommage des fichiers est le suivant : n°pagemanuscrit_initiale.xml/png
language:
  - fra
script: []
script-type: only-manuscript
production-software: eScriptorium + Kraken
